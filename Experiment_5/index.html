<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>JavaScript Lab</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <h1 id="heading">Welcome to JavaScript Lab</h1>

            <input
                type="text"
                id="inputText"
                placeholder="Enter new heading text"
            />

            <div class="buttons">
                <button id="changeHeading">Change Heading</button>
                <button id="changeBg">Change Background</button>
                <button id="increaseFont">Increase Font Size</button>
                <button id="togglePara">Show/Hide Paragraph</button>
                <button id="reset">Reset</button>
            </div>

            <p id="para">This is a sample paragraph..</p>
        </div>

        <script src="script.js"></script>
    </body>
</html>
